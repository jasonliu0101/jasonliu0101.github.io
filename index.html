<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects</title>
<style>
  :root{color-scheme:light dark}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{font-family:system-ui,"PingFang TC","Noto Sans TC",sans-serif;
       background:#0f1115;color:#e7e9ee;display:grid;place-items:center;padding:24px}
  .wrap{width:100%;max-width:560px}
  h1{font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
     color:#8b93a7;margin:0 0 18px}
  a.card{display:block;text-decoration:none;color:inherit;
     background:#171a21;border:1px solid #242a36;border-radius:16px;padding:22px 24px;
     transition:border-color .15s,transform .15s}
  a.card:hover{border-color:#3a5bd0;transform:translateY(-2px)}
  .t{font-size:20px;font-weight:700;margin:0 0 6px}
  .d{margin:0;color:#9aa3b5;font-size:14px;line-height:1.6}
  .go{margin-top:14px;color:#7db1ff;font-size:14px;font-weight:600}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Projects</h1>
    <a class="card" href="./ppa/">
      <p class="t">PPA · 三段式學習動線</p>
      <p class="d">課前學習人格測驗 → 影片學習（重播熱力圖 × AI 助教 × 精華 Reels）→ 課後學習城市。一次完整的學習旅程，串成一條線。</p>
      <div class="go">進入 →</div>
    </a>
  </div>
</body>
</html>
